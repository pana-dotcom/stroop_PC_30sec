<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Stroop test</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin-top: 50px;
}

#instruction {
  font-size: 28px;
  font-weight: bold;
}

#guide {
  margin-top: 15px;
  font-size: 32px;
  font-weight: bold;
  white-space: nowrap;
}

#word.start {
  color: black;
  text-decoration: underline;
}

#word {
  font-size: 64px;
  margin: 40px;
}

button {
  font-size: 18px;
  margin: 5px;
}

#keymap {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.arrow-row {
  display: flex;
  justify-content: center;
  align-items: center;
}

.keybox {
  display: flex;
  justify-content: center;
  align-items: center;

  width: 90px;
  height: 90px;
  margin: 5px;

  border: 3px solid #333;
  border-radius: 10px;

  font-size: 30px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Stroopテスト</h1>
<p id="instruction">色を回答！</p>

<div>
  <div id="word" class="start">スタートを押してください</div>

  <div id="guide">
    ↑：赤　/　←：青　/　→：緑　/　↓：黄
  </div>

  <div style="margin-top: 15px;">
    <button id="startBtn">スタート</button>
  </div>
</div>

<div id="keymap">

  <div class="arrow-row">
    <div class="keybox">赤</div>
  </div>

  <div class="arrow-row">
    <div class="keybox">青</div>
    <div class="keybox">黄</div>
    <div class="keybox">緑</div>
  </div>

</div>

<script>
const texts = ["赤","青","緑","黄"];
const colors = ["red","blue","green","gold"];

const keyMap = {
  "arrowup": "red",
  "arrowleft": "blue",
  "arrowright": "green",
  "arrowdown": "gold"
};

let current;
let startTime;
let isRunning = false;
let canRespond = false;
let answered = false;

let trialCount = 0;
let csvLog = [];

const timeLimit = 30000;
let stimulusTimer;

// ✅ スタート
document.getElementById("startBtn").addEventListener("click", () => {

  document.getElementById("word").classList.remove("start");
  document.getElementById("guide").style.display = "none";

  trialCount = 0;
  csvLog = [];
  isRunning = true;

  showFixation();

  setTimeout(endTest, timeLimit);
});

// ✅ 注視点
function showFixation() {
  if (!isRunning) return;

  const wordDiv = document.getElementById("word");
  wordDiv.textContent = "✖";
  wordDiv.style.color = "black";

  canRespond = false;

  setTimeout(showStimulus, 500);
}

// ✅ 刺激
function showStimulus() {
  if (!isRunning) return;

  const rand = Math.random();
  let condition = rand < 0.25 ? 1 : rand < 0.75 ? 2 : 3;

  let text, color;

  if (condition === 1) {

    let i = Math.floor(Math.random() * 4);

    text = texts[i];
    color = colors[i];

  } else if (condition === 2) {

    let i = Math.floor(Math.random() * 4);
    let j;

    do {
      j = Math.floor(Math.random() * 4);
    } while (j === i);

    text = texts[i];
    color = colors[j];

  } else {

    text = "●";
    color = colors[Math.floor(Math.random() * 4)];

  }

  current = { text, color, condition };

  const wordDiv = document.getElementById("word");

  requestAnimationFrame(() => {

    wordDiv.textContent = text;
    wordDiv.style.color = color;

    startTime = performance.now();
    canRespond = true;
    answered = false;

  });

  stimulusTimer = setTimeout(() => {

    if (!answered) {

      trialCount++;

      csvLog.push([
        trialCount,
        current.condition,
        "",
        0
      ]);
    }

    showFixation();

  }, 2000);
}

// ✅ キー入力
document.addEventListener("keydown", (e) => {

  if (!isRunning || !canRespond || answered) return;

  const key = e.key.toLowerCase();

  if (!(key in keyMap)) return;

  handleAnswer(keyMap[key]);

});

// ✅ 回答
function handleAnswer(ans) {

  answered = true;

  const rt = Math.round(
    performance.now() - startTime
  );

  const correct =
    ans === current.color ? 1 : 0;

  trialCount++;

  csvLog.push([
    trialCount,
    current.condition,
    rt,
    correct
  ]);

  canRespond = false;
}

// ✅ 終了
function endTest() {

  isRunning = false;

  const wordDiv =
    document.getElementById("word");

  wordDiv.textContent = "終了！";
  wordDiv.style.color = "black";

  let csv =
    "試行回数,条件,反応時間(ms),正誤\n";

  csvLog.forEach(row =>
    csv += row.join(",") + "\n"
  );

  const now = new Date();

  const fileName =
    now.getFullYear() +
    String(now.getMonth()+1).padStart(2,"0") +
    String(now.getDate()).padStart(2,"0") + "_" +
    String(now.getHours()).padStart(2,"0") +
    String(now.getMinutes()).padStart(2,"0");

  const blob = new Blob(
    ["\uFEFF" + csv],
    { type:"text/csv" }
  );

  const link =
    document.createElement("a");

  link.href =
    URL.createObjectURL(blob);

  link.download =
    "stroop_" + fileName + ".csv";

  link.click();

}
</script>

</body>
</html>
