<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Stroop test</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin-top: 50px;
}
#word {
  font-size: 64px;
  margin: 40px;
}
button {
  font-size: 18px;
  margin: 5px;
}

#keymap {
  margin-top: 40px;
}

.keybox {
  display: inline-block;
  width: 80px;
  height: 80px;
  line-height: 80px;
  margin: 10px;
  font-size: 40px;
  font-weight: bold;
  border: 3px solid #333;
  border-radius: 10px;
}
</style>
</head>
<body>

<h1>Stroopテスト</h1>
<p>「文字ではなく色」をキーで選んでください</p>

<div>
  <div id="word">スタートを押してください</div>
  <div style="margin-top: 15px;">
    <button id="startBtn">スタート</button>
  </div>
</div>

<div id="keymap">
  <div class="keybox" style="color:red;">D</div>
  <div class="keybox" style="color:blue;">F</div>
  <div class="keybox" style="color:green;">J</div>
  <div class="keybox" style="color:gold;">K</div>
</div>

<script>
const texts = ["赤","青","緑","黄"];
const colors = ["red","blue","green","gold"];
const keyMap = {
  "d": "red",
  "f": "blue",
  "j": "green",
  "k": "gold"  // ✅ 修正済み（重要）
};

let current;
let startTime;
let isRunning = false;
let canRespond = false;

let trialCount = 0;
let csvLog = [];

const timeLimit = 600000;

// ✅ スタート
document.getElementById("startBtn").addEventListener("click", () => {

  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  trialCount = 0;
  csvLog = [];
  isRunning = true;

  showFixation(); // ✅ ✖から開始

  setTimeout(() => {
    endTest();
  }, timeLimit);
});

// ✅ 注視点（500ms）
function showFixation() {
  if (!isRunning) return;

  const wordDiv = document.getElementById("word");
  wordDiv.textContent = "✖";
  wordDiv.style.color = "black";

  canRespond = false;

  setTimeout(() => {
    showStimulus();
  }, 500);
}

// ✅ 刺激提示（2000ms）
function showStimulus() {
  if (!isRunning) return;

  const rand = Math.random();
  let condition;

  if (rand < 0.25) {
    condition = 1;
  } else if (rand < 0.75) {
    condition = 2;
  } else {
    condition = 3;
  }

  let text, color;

  if (condition === 1) {
    let i = Math.floor(Math.random() * texts.length);
    text = texts[i];
    color = colors[i];

  } else if (condition === 2) {
    let i = Math.floor(Math.random() * texts.length);
    let j;
    do {
      j = Math.floor(Math.random() * colors.length);
    } while (j === i);

    text = texts[i];
    color = colors[j];

  } else {
    text = "●";
    color = colors[Math.floor(Math.random() * colors.length)];
  }

  current = { text, color, condition };

  const wordDiv = document.getElementById("word");
  wordDiv.textContent = text;
  wordDiv.style.color = color;

  startTime = performance.now();
  canRespond = true;

  // ✅ 2000ms後に自動で次の✖へ
  setTimeout(() => {

    // 無反応でも記録
    trialCount++;
    csvLog.push([
      trialCount,
      current.condition,
      "",
      0
    ]);

    showFixation();

  }, 2000);
}

// ✅ キー入力
document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();
  if (!keyMap[key]) return;
  handleAnswer(keyMap[key]);
});

// ✅ 回答処理
function handleAnswer(ans) {
  if (!isRunning || !canRespond) return;

  const rt = Math.round(performance.now() - startTime);
  const correct = (ans === current.color) ? 1 : 0;

  trialCount++;

  csvLog.push([
    trialCount,
    current.condition,
    rt,
    correct
  ]);

  canRespond = false;

  showFixation(); // ✅ 回答後すぐ✖へ
}

// ✅ 終了
function endTest() {
  isRunning = false;

  const wordDiv = document.getElementById("word");
  wordDiv.textContent = "終了！";
  wordDiv.style.color = "black";

  let csv = "試行回数,条件,反応時間(ms),正誤\n";
  csvLog.forEach(row => {
    csv += row.join(",") + "\n";
  });

  const now = new Date();
  const fileName =
    now.getFullYear() +
    String(now.getMonth()+1).padStart(2,"0") +
    String(now.getDate()).padStart(2,"0") + "_" +
    String(now.getHours()).padStart(2,"0") +
    String(now.getMinutes()).padStart(2,"0");

  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], {type:"text/csv"});

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "stroop_" + fileName + ".csv";
  link.click();
}
</script>

</body>
</html>
